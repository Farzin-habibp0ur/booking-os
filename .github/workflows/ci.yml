name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booking_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_os_test?schema=public
      JWT_SECRET: test-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (critical - blocking)
        run: npm audit --audit-level=critical --omit=dev

      - name: Security audit (high - informational)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Build web-chat widget
        run: cd packages/web-chat-widget && node build.mjs

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Check formatting
        run: npm run format:check

      - name: Lint (ESLint + type-check)
        run: npm run lint

      - name: Run tests
        run: npm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booking_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_os_test?schema=public
      JWT_SECRET: test-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only
      NODE_ENV: test
      E2E_EMAIL: sarah@glowclinic.com
      E2E_PASSWORD: Bk0s!DemoSecure#2026

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Seed test data
        run: npx tsx packages/db/src/seed.ts

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.prod.yml build
        env:
          JWT_SECRET: dummy
          JWT_REFRESH_SECRET: dummy
          WEBHOOK_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          STRIPE_SECRET_KEY: dummy
          STRIPE_WEBHOOK_SECRET: dummy
          STRIPE_PRICE_ID_BASIC: dummy
          STRIPE_PRICE_ID_PRO: dummy
          SENTRY_DSN: ''
          WHATSAPP_PHONE_NUMBER_ID: dummy
          WHATSAPP_ACCESS_TOKEN: dummy
          WHATSAPP_VERIFY_TOKEN: dummy

      - name: Scan API image (critical - blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-api:latest
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan API image (high - informational)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-api:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-web:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Scan Admin image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-admin:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Prisma CLI
        run: npm install prisma@latest --no-save

      # Run database migrations against production BEFORE deploying new code
      - name: Run production database migrations
        run: |
          export DATABASE_URL=$(railway variables get DATABASE_URL --service api -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production)
          echo "Running migrations against production database..."
          npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma
          echo "Migrations completed successfully."

      # Stage 1: Deploy API
      - name: Deploy API
        run: railway up --service api -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach

      - name: Wait for API health
        run: |
          echo "Polling API health (waiting for fresh container)..."
          TIMEOUT=300
          INTERVAL=5
          ELAPSED=0
          # Record pre-deploy uptime to detect container restart
          PRE_UPTIME=$(curl -s https://api.businesscommandcentre.com/api/v1/health 2>/dev/null | jq -r '.uptime // 999999' 2>/dev/null || echo "999999")
          echo "Pre-deploy uptime: ${PRE_UPTIME}s"
          until [ "$ELAPSED" -ge "$TIMEOUT" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.businesscommandcentre.com/api/v1/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              BODY=$(curl -s https://api.businesscommandcentre.com/api/v1/health 2>/dev/null)
              HEALTH=$(echo "$BODY" | jq -r '.status' 2>/dev/null || echo "unknown")
              UPTIME=$(echo "$BODY" | jq -r '.uptime' 2>/dev/null || echo "999999")
              if ([ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "degraded" ]) && [ "$UPTIME" -lt "$PRE_UPTIME" ]; then
                echo "API healthy with fresh container after ${ELAPSED}s (uptime=${UPTIME}s)"
                exit 0
              elif [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "degraded" ]; then
                echo "Waiting for container restart... (${ELAPSED}s, uptime=${UPTIME}s)"
              fi
            else
              echo "Waiting... (${ELAPSED}s, HTTP $STATUS)"
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          # If container didn't restart but is healthy, still pass (migrations ran in CI)
          echo "WARNING: Container may not have restarted, but migrations were applied in CI"

      # Stage 2: Deploy Web (only if API is healthy)
      - name: Deploy Web
        run: railway up --service web -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach

      - name: Wait for Web health
        run: |
          echo "Polling Web health..."
          TIMEOUT=300
          INTERVAL=5
          ELAPSED=0
          until [ "$ELAPSED" -ge "$TIMEOUT" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://businesscommandcentre.com/api/v1/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Web healthy after ${ELAPSED}s (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting... (${ELAPSED}s, HTTP $STATUS)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "ERROR: Web did not become healthy within ${TIMEOUT}s"
          exit 1

      # Stage 3: Deploy Admin (only if Web is healthy)
      - name: Deploy Admin
        run: railway up --service admin -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach

      - name: Wait for Admin health
        run: |
          echo "Polling Admin health..."
          TIMEOUT=300
          INTERVAL=5
          ELAPSED=0
          until [ "$ELAPSED" -ge "$TIMEOUT" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.businesscommandcentre.com/api/v1/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Admin healthy after ${ELAPSED}s (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting... (${ELAPSED}s, HTTP $STATUS)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "ERROR: Admin did not become healthy within ${TIMEOUT}s"
          exit 1

  bundle-check:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Build web-chat widget
        run: cd packages/web-chat-widget && node build.mjs

      - name: Build Web app
        run: npx turbo run build --filter=@booking-os/web
        env:
          NEXT_PUBLIC_API_URL: https://api.businesscommandcentre.com
          NEXT_PUBLIC_WS_URL: wss://api.businesscommandcentre.com
          NEXT_PUBLIC_APP_URL: https://businesscommandcentre.com
          NEXT_PUBLIC_ADMIN_URL: https://admin.businesscommandcentre.com

      - name: Report bundle size
        run: |
          CLIENT_SIZE=$(du -sb apps/web/.next/static/ | awk '{print $1}')
          CLIENT_MB=$(echo "scale=2; $CLIENT_SIZE / 1048576" | bc)
          TOTAL_SIZE=$(du -sb apps/web/.next/ | awk '{print $1}')
          TOTAL_MB=$(echo "scale=2; $TOTAL_SIZE / 1048576" | bc)
          echo "## Web Bundle Size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client bundle (.next/static/) | ${CLIENT_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Total build output (.next/) | ${TOTAL_MB} MB |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          LIMIT=62914560
          if [ "$CLIENT_SIZE" -gt "$LIMIT" ]; then
            echo "::error::Client bundle size ${CLIENT_MB}MB exceeds 60MB limit"
            exit 1
          else
            echo "Client bundle ${CLIENT_MB}MB is within 60MB limit (total build: ${TOTAL_MB}MB)"
          fi

  smoke-test:
    name: Production Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh https://businesscommandcentre.com
