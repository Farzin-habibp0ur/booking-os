name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booking_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_os_test?schema=public
      JWT_SECRET: test-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Build web-chat widget
        run: cd packages/web-chat-widget && node build.mjs

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Check formatting
        run: npm run format:check

      - name: Lint (ESLint + type-check)
        run: npm run lint

      - name: Run tests
        run: npm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: booking_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/booking_os_test?schema=public
      JWT_SECRET: test-secret-for-ci-only
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci-only
      NODE_ENV: test
      E2E_EMAIL: sarah@glowclinic.com
      E2E_PASSWORD: password123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=packages/db/prisma/schema.prisma

      - name: Seed test data
        run: npx tsx packages/db/src/seed.ts

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker-compose.prod.yml build
        env:
          JWT_SECRET: dummy
          JWT_REFRESH_SECRET: dummy
          WEBHOOK_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
          STRIPE_SECRET_KEY: dummy
          STRIPE_WEBHOOK_SECRET: dummy
          STRIPE_PRICE_ID_BASIC: dummy
          STRIPE_PRICE_ID_PRO: dummy
          SENTRY_DSN: ''
          WHATSAPP_PHONE_NUMBER_ID: dummy
          WHATSAPP_ACCESS_TOKEN: dummy
          WHATSAPP_VERIFY_TOKEN: dummy

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-api:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-web:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Scan Admin image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: booking-os-admin:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy API
        run: railway up --service api -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach
      - name: Deploy Web
        run: railway up --service web -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach
      - name: Deploy Admin
        run: railway up --service admin -p ${{ secrets.RAILWAY_PROJECT_ID }} -e production --detach

  smoke-test:
    name: Production Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Wait for API to become healthy
        run: |
          echo "Polling API health endpoint..."
          TIMEOUT=300
          INTERVAL=5
          ELAPSED=0
          until [ "$ELAPSED" -ge "$TIMEOUT" ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.businesscommandcentre.com/api/v1/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "API healthy after ${ELAPSED}s (HTTP $STATUS)"
              exit 0
            fi
            echo "Waiting... (${ELAPSED}s elapsed, HTTP $STATUS)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "ERROR: API did not become healthy within ${TIMEOUT}s"
          exit 1

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh https://businesscommandcentre.com

      - name: Smoke test admin console
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://admin.businesscommandcentre.com/api/v1/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "Admin console health check returned HTTP $STATUS"
            exit 1
          fi
          echo "Admin console healthy (HTTP $STATUS)"
